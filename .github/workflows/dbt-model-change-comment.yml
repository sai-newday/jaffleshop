name: dbt Model Change Comment

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-dbt-model-changes:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create CI dbt profile
        run: |
          mkdir -p ./.ci
          cat > ./.ci/profiles.yml <<'EOF'
          jaffleshop:
            outputs:
              ci:
                type: duckdb
                path: "jaffleshop.duckdb"
                threads: 4
            target: ci
          EOF

      - name: Build dbt manifest
        run: |
          dbt deps --profiles-dir ./.ci
          dbt parse --profiles-dir ./.ci

      - name: Analyze model changes and comment on PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MANIFEST_PATH: target/manifest.json
        run: python scripts/dbt_pr_model_change_report.py
