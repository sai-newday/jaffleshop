name: dbt Model Change Comment

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-dbt-model-changes:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      COLIBRI_REPO_URL: https://github.com/sai-newday/dbt-colibri.git
      COLIBRI_REF: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dbt-colibri and merged artifacts
        run: |
          set -euo pipefail

          COLIBRI_DIR="${RUNNER_TEMP}/dbt-colibri"
          git clone --depth 1 --branch "${COLIBRI_REF}" "${COLIBRI_REPO_URL}" "${COLIBRI_DIR}"

          BLAST_MANIFEST_PATH="${COLIBRI_DIR}/combined-lineage/dist/_merged_artifacts/manifest.json"
          BLAST_CATALOG_PATH="${COLIBRI_DIR}/combined-lineage/dist/_merged_artifacts/catalog.json"

          if [ ! -f "${BLAST_MANIFEST_PATH}" ]; then
            echo "Blast manifest missing: ${BLAST_MANIFEST_PATH}"
            exit 1
          fi

          if [ ! -f "${BLAST_CATALOG_PATH}" ]; then
            echo "Blast catalog missing: ${BLAST_CATALOG_PATH}"
            exit 1
          fi

          echo "COLIBRI_DIR=${COLIBRI_DIR}" >> "$GITHUB_ENV"
          echo "BLAST_MANIFEST_PATH=${BLAST_MANIFEST_PATH}" >> "$GITHUB_ENV"
          echo "BLAST_CATALOG_PATH=${BLAST_CATALOG_PATH}" >> "$GITHUB_ENV"

      - name: Install dbt-colibri from GitHub clone
        run: |
          set -euo pipefail
          pip install "$COLIBRI_DIR"

      - name: Create CI dbt profile
        run: |
          mkdir -p ./.ci
          cat > ./.ci/profiles.yml <<'EOF'
          jaffleshop:
            outputs:
              ci:
                type: duckdb
                path: "jaffleshop.duckdb"
                threads: 4
            target: ci
          EOF

      - name: Build dbt manifest
        run: |
          dbt deps --profiles-dir ./.ci
          dbt parse --profiles-dir ./.ci

      - name: Analyze model changes and comment on PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MANIFEST_PATH: target/manifest.json
          BLAST_MANIFEST_PATH: ${{ env.BLAST_MANIFEST_PATH }}
          BLAST_CATALOG_PATH: ${{ env.BLAST_CATALOG_PATH }}
          COLIBRI_CMD: colibri
        run: python scripts/dbt_pr_model_change_report.py
